<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wordle</title>

<style>
  :root {
    --bg: #121213;
    --tile: #3a3a3c;
    --empty: #121213;
    --border: #3a3a3c;
    --green: #6aaa64;
    --yellow: #c9b458;
    --gray: #3a3a3c;
    --text: #ffffff;
  }

  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  h1 {
    margin: 20px 0;
  }

  #board {
    display: grid;
    gap: 5px;
    margin: 20px 0;
  }

  .row {
    display: grid;
    gap: 5px;
  }

  .tile {
    width: 50px;
    height: 50px;
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    font-weight: bold;
    text-transform: uppercase;
  }

  .correct { background: var(--green); border: none; }
  .present { background: var(--yellow); border: none; }
  .absent  { background: var(--gray); border: none; }

  #keyboard {
    margin-top: 10px;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .key-row {
    display: flex;
    justify-content: center;
    gap: 5px;
  }

  button.key {
    padding: 10px;
    min-width: 30px;
    border: none;
    background: #818384;
    color: white;
    font-weight: bold;
    cursor: pointer;
  }

  button.wide { min-width: 60px; }
</style>

</head>

<body>

<h1>WORDLE</h1>
<div id="board"></div>
<div id="keyboard"></div>

<script>
const params = new URLSearchParams(window.location.search);
const word = (params.get("w") || "apple").toLowerCase();

const rows = 6;
const cols = word.length;

let currentRow = 0;
let currentGuess = "";

const board = document.getElementById("board");
board.style.gridTemplateRows = `repeat(${rows}, auto)`;

// Create board
for (let r = 0; r < rows; r++) {
  const row = document.createElement("div");
  row.className = "row";
  row.style.gridTemplateColumns = `repeat(${cols}, 50px)`;

  for (let c = 0; c < cols; c++) {
    const tile = document.createElement("div");
    tile.className = "tile";
    row.appendChild(tile);
  }

  board.appendChild(row);
}

// Keyboard
const keys = ["qwertyuiop","asdfghjkl","zxcvbnm"];
const keyboard = document.getElementById("keyboard");

keys.forEach((rowKeys, i) => {
  const row = document.createElement("div");
  row.className = "key-row";

  if (i === 2) {
    row.appendChild(createKey("Enter", true));
  }

  rowKeys.split("").forEach(k => {
    row.appendChild(createKey(k));
  });

  if (i === 2) {
    row.appendChild(createKey("⌫", true));
  }

  keyboard.appendChild(row);
});

function createKey(letter, wide=false) {
  const btn = document.createElement("button");
  btn.textContent = letter;
  btn.className = "key" + (wide ? " wide" : "");
  btn.onclick = () => handleKey(letter);
  return btn;
}

// Input handling
document.addEventListener("keydown", (e) => {
  if (e.key === "Enter") handleKey("Enter");
  else if (e.key === "Backspace") handleKey("⌫");
  else if (/^[a-zA-Z]$/.test(e.key)) handleKey(e.key);
});

function handleKey(key) {
  if (currentRow >= rows) return;

  if (key === "Enter") {
    if (currentGuess.length !== cols) return;
    checkGuess();
  } else if (key === "⌫") {
    currentGuess = currentGuess.slice(0, -1);
  } else {
    if (currentGuess.length < cols) {
      currentGuess += key;
    }
  }

  updateBoard();
}

function updateBoard() {
  const row = board.children[currentRow];

  for (let i = 0; i < cols; i++) {
    row.children[i].textContent = currentGuess[i] || "";
  }
}

function checkGuess() {
  const row = board.children[currentRow];
  const guess = currentGuess;

  let tempWord = word.split("");

  // First pass (correct)
  for (let i = 0; i < cols; i++) {
    if (guess[i] === word[i]) {
      row.children[i].classList.add("correct");
      tempWord[i] = null;
    }
  }

  // Second pass (present)
  for (let i = 0; i < cols; i++) {
    if (!row.children[i].classList.contains("correct")) {
      const index = tempWord.indexOf(guess[i]);
      if (index !== -1) {
        row.children[i].classList.add("present");
        tempWord[index] = null;
      } else {
        row.children[i].classList.add("absent");
      }
    }
  }

  if (guess === word) {
    setTimeout(() => alert("🎉 You win!"), 200);
    return;
  }

  currentRow++;
  currentGuess = "";

  if (currentRow === rows) {
    setTimeout(() => alert(`❌ Word was: ${word}`), 200);
  }
}
</script>

</body>
</html>
