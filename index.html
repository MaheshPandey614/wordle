<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle Today</title>

<style>
:root {
  --bg: #121213;
  --green: #6aaa64;
  --yellow: #c9b458;
  --gray: #3a3a3c;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: white;
  text-align: center;
}

/* Game container keeps board + share button aligned */
#gameContainer {
  display: flex;
  flex-direction: column;
  align-items: center;
}

#board {
  margin-top: 20px;
  display: grid;
  gap: 5px;
}

.row { display: grid; gap: 5px; }

.tile {
  width: 50px;
  height: 50px;
  border: 2px solid #3a3a3c;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  font-weight: bold;
}

.correct { background: var(--green); }
.present { background: var(--yellow); }
.absent { background: var(--gray); }

/* Keyboard */
#keyboard { margin-top: 20px; }
.key-row { display: flex; justify-content: center; gap: 5px; }
.key {
  padding: 10px;
  border: none;
  background: #818384;
  color: white;
  cursor: pointer;
}
.wide { width: 60px; }

/* Share button (hidden until game ends) */
#shareBtn {
  margin-top: 15px;
  padding: 10px 20px;
  background: #6aaa64;
  color: white;
  border: none;
  border-radius: 5px;
  display: none;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>WORDLE</h1>

<div id="gameContainer">
  <div id="board"></div>
  <button id="shareBtn" onclick="shareResult()">📤 Share Result</button>
</div>

<div id="keyboard"></div>

<script>
// ============================
// LOAD DICTIONARY
// ============================
let validWords = [];

fetch("words.txt")
  .then(res => res.text())
  .then(text => {
    validWords = text.split("\n").map(w => w.trim().toLowerCase());
  });

// ============================
// GET WORD FROM URL (Base64)
// ============================
const params = new URLSearchParams(window.location.search);
let encoded = params.get("w") || "";
let word = "";

try {
  word = atob(encoded).toLowerCase();
} catch {
  word = "apple";
}

// ============================
// GAME STATE
// ============================
const rows = 6;
const cols = word.length;

let currentRow = 0;
let currentGuess = "";
let results = [];
let gameWon = false;

// ============================
// BUILD BOARD
// ============================
const board = document.getElementById("board");

for (let r = 0; r < rows; r++) {
  const row = document.createElement("div");
  row.className = "row";
  row.style.gridTemplateColumns = `repeat(${cols}, 50px)`;

  for (let c = 0; c < cols; c++) {
    const tile = document.createElement("div");
    tile.className = "tile";
    row.appendChild(tile);
  }

  board.appendChild(row);
}

// ============================
// KEYBOARD
// ============================
const keys = ["qwertyuiop","asdfghjkl","zxcvbnm"];
const keyboard = document.getElementById("keyboard");

keys.forEach((r,i)=>{
  const row = document.createElement("div");
  row.className="key-row";

  if(i===2) row.appendChild(createKey("Enter",true));

  r.split("").forEach(k=>row.appendChild(createKey(k)));

  if(i===2) row.appendChild(createKey("⌫",true));

  keyboard.appendChild(row);
});

function createKey(letter,wide=false){
  const btn=document.createElement("button");
  btn.textContent=letter;
  btn.className="key"+(wide?" wide":"");
  btn.onclick=()=>handleKey(letter);
  return btn;
}

// ============================
// INPUT HANDLING
// ============================
document.addEventListener("keydown",e=>{
  if(e.key==="Enter") handleKey("Enter");
  else if(e.key==="Backspace") handleKey("⌫");
  else if(/^[a-zA-Z]$/.test(e.key)) handleKey(e.key);
});

function handleKey(key){
  if(currentRow>=rows) return;

  if(key==="Enter"){ checkGuess(); return; }
  if(key==="⌫"){ currentGuess=currentGuess.slice(0,-1); }
  else if(currentGuess.length<cols){ currentGuess+=key; }

  updateBoard();
}

function updateBoard(){
  const row=board.children[currentRow];
  for(let i=0;i<cols;i++){
    row.children[i].textContent=currentGuess[i]||"";
  }
}

// ============================
// GAME LOGIC
// ============================
function checkGuess(){
  const row=board.children[currentRow];
  const guess=currentGuess;

  if(guess.length!==cols){ alert("Incomplete word"); return; }
  if(!validWords.includes(guess)){ alert("Not a valid word"); return; }

  let tempWord=word.split("");
  let rowResult=[];

  for(let i=0;i<cols;i++){
    const tile=row.children[i];

    if(guess[i]===word[i]){
      tile.classList.add("correct");
      tempWord[i]=null;
      rowResult.push("🟩");
    } else {
      const idx=tempWord.indexOf(guess[i]);
      if(idx!==-1){
        tile.classList.add("present");
        tempWord[idx]=null;
        rowResult.push("🟨");
      } else {
        tile.classList.add("absent");
        rowResult.push("⬛");
      }
    }
  }

  results.push(rowResult.join(""));

  // WIN
  if(guess===word){
    gameWon = true;
    let tries = results.length;
    alert(`🎉 You won in ${tries}/6!`);
    showShare();
    return;
  }

  currentRow++;
  currentGuess="";

  // LOSE
  if(currentRow===rows){
    alert(`😅 You lost! Word was "${word}"`);
    showShare();
  }
}

// ============================
// SHOW SHARE BUTTON
// ============================
function showShare(){
  document.getElementById("shareBtn").style.display="block";
}

// ============================
// SHARE RESULT
// ============================
function shareResult(){

  let text = "";

  if(gameWon){
    let tries = results.findIndex(r => r === "🟩".repeat(word.length)) + 1;
    text += `Wordle ${tries}/6 🎯\n\n`;
  } else {
    text += `Wordle\n\n`;
  }

  results.forEach(r => text += r + "\n");

  if(!gameWon){
    text += "\n😅 Tough one today!\n";
  }

  // IMPORTANT: link on separate line → clickable in Teams
  text += `\nPlay here:\n${window.location.href}`;

  copy(text);
}

// ============================
// COPY (RELIABLE)
// ============================
function copy(text){
  const textarea = document.createElement("textarea");
  textarea.value = text;
  document.body.appendChild(textarea);
  textarea.select();

  try {
    document.execCommand("copy");
    alert("Copied! Paste it in Teams 🚀");
  } catch {
    prompt("Copy manually:", text);
  }

  document.body.removeChild(textarea);
}
</script>

</body>
</html>
