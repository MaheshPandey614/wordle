<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle</title>

<style>
:root {
  --bg: #121213;
  --green: #6aaa64;
  --yellow: #c9b458;
  --gray: #3a3a3c;
}

body {
  margin: 0;
  font-family: Arial;
  background: var(--bg);
  color: white;
  text-align: center;
}

#board { margin-top: 20px; display: grid; gap: 5px; justify-content: center; }
.row { display: grid; gap: 5px; }

.tile {
  width: 50px; height: 50px;
  border: 2px solid #3a3a3c;
  display: flex; align-items: center; justify-content: center;
  font-size: 24px; font-weight: bold;
}

.correct { background: var(--green); }
.present { background: var(--yellow); }
.absent { background: var(--gray); }

#keyboard { margin-top: 20px; }
.key-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }
.key {
  padding: 10px;
  border: none;
  background: #818384;
  color: white;
  cursor: pointer;
}
.wide { width: 60px; }

/* Animations */
@keyframes flip {
  0% { transform: rotateX(0); }
  50% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}
.tile.flip { animation: flip 0.5s; }

@keyframes pop {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}
.tile.pop { animation: pop 0.2s; }

@keyframes shake {
  0% { transform: translateX(0); }
  25% { transform: translateX(-5px); }
  50% { transform: translateX(5px); }
  75% { transform: translateX(-5px); }
}
.row.shake { animation: shake 0.3s; }

#shareBtn {
  margin-top: 15px;
  padding: 10px;
  background: green;
  color: white;
  border: none;
  display: none;
}
</style>

</head>

<body>

<h1>WORDLE</h1>
<div id="board"></div>
<div id="keyboard"></div>
<button id="shareBtn" onclick="shareResult()">📤 Share Result</button>

<script>
// ===== LOAD WORD LIST =====
let validWords = [];

fetch("words.txt")
  .then(res => res.text())
  .then(text => {
    validWords = text.split("\n").map(w => w.trim().toLowerCase());
  });

// ===== SETUP =====
const params = new URLSearchParams(window.location.search);
let encoded = params.get("w") || "";
let word = "";

try {
  word = atob(encoded).toLowerCase();
} catch {
  word = "apple"; // fallback
}

const rows = 6;
const cols = word.length;

let currentRow = 0;
let currentGuess = "";
let results = [];

const board = document.getElementById("board");
board.style.gridTemplateRows = `repeat(${rows}, auto)`;

// Build board
for (let r = 0; r < rows; r++) {
  const row = document.createElement("div");
  row.className = "row";
  row.style.gridTemplateColumns = `repeat(${cols}, 50px)`;

  for (let c = 0; c < cols; c++) {
    const tile = document.createElement("div");
    tile.className = "tile";
    row.appendChild(tile);
  }

  board.appendChild(row);
}

// ===== KEYBOARD =====
const keys = ["qwertyuiop","asdfghjkl","zxcvbnm"];
const keyboard = document.getElementById("keyboard");

keys.forEach((r,i)=>{
  const row = document.createElement("div");
  row.className="key-row";

  if(i===2) row.appendChild(createKey("Enter",true));

  r.split("").forEach(k=>row.appendChild(createKey(k)));

  if(i===2) row.appendChild(createKey("⌫",true));

  keyboard.appendChild(row);
});

function createKey(letter,wide=false){
  const btn=document.createElement("button");
  btn.textContent=letter;
  btn.className="key"+(wide?" wide":"");
  btn.id="key-"+letter;
  btn.onclick=()=>handleKey(letter);
  return btn;
}

// ===== INPUT =====
document.addEventListener("keydown",e=>{
  if(e.key==="Enter") handleKey("Enter");
  else if(e.key==="Backspace") handleKey("⌫");
  else if(/^[a-zA-Z]$/.test(e.key)) handleKey(e.key);
});

function handleKey(key){
  if(currentRow>=rows) return;

  if(key==="Enter"){ checkGuess(); return; }
  if(key==="⌫"){ currentGuess=currentGuess.slice(0,-1); }
  else if(currentGuess.length<cols){ currentGuess+=key; }

  updateBoard();
}

// ===== UPDATE BOARD =====
function updateBoard(){
  const row=board.children[currentRow];

  for(let i=0;i<cols;i++){
    const tile=row.children[i];
    tile.textContent=currentGuess[i]||"";

    if(currentGuess[i]){
      tile.classList.add("pop");
      setTimeout(()=>tile.classList.remove("pop"),200);
    }
  }
}

// ===== CHECK =====
function checkGuess(){
  const row=board.children[currentRow];
  const guess=currentGuess;

  if(validWords.length===0){
    alert("Dictionary loading...");
    return;
  }

  if(guess.length!==cols){ shake(row); return; }

  if(!validWords.includes(guess)){
    shake(row);
    alert("Not a valid word");
    return;
  }

  let tempWord=word.split("");
  let rowResult=[];

  for(let i=0;i<cols;i++){
    setTimeout(()=>{
      const tile=row.children[i];
      tile.classList.add("flip");

      setTimeout(()=>{
        let key=document.getElementById("key-"+guess[i]);

        if(guess[i]===word[i]){
          tile.classList.add("correct");
          key.style.background="green";
          tempWord[i]=null;
          rowResult.push("🟩");
        }
        else{
          const idx=tempWord.indexOf(guess[i]);
          if(idx!==-1){
            tile.classList.add("present");
            if(key.style.background!=="green")
              key.style.background="#c9b458";
            tempWord[idx]=null;
            rowResult.push("🟨");
          }
          else{
            tile.classList.add("absent");
            key.style.background="#3a3a3c";
            rowResult.push("⬛");
          }
        }
      },250);

    },i*300);
  }

  setTimeout(()=>{
    results.push(rowResult.join(""));

    if(guess===word){
      document.getElementById("shareBtn").style.display="block";
      alert("🎉 You win!");
      return;
    }

    currentRow++;
    currentGuess="";

    if(currentRow===rows){
      document.getElementById("shareBtn").style.display="block";
      alert(`Word was: ${word}`);
    }
  },cols*300+200);
}

// ===== SHAKE =====
function shake(row){
  row.classList.add("shake");
  setTimeout(()=>row.classList.remove("shake"),300);
}

// ===== SHARE =====
function shareResult() {
let tries = results.length;

let win = results.some(r => r.split("").every(c => c === "🟩"));

let text = `🎯 Wordle ${win ? tries : "X"}/6\n\n`;

results.forEach(r => text += r + "\n");

if (!win) {
text += "\n😅 Tough one today!\n";
}

text += `\nPlay here:\n${window.location.href}`;

// Try modern clipboard API
navigator.clipboard.writeText(text).then(() => {
showToast("Copied! Share it in Teams 🚀");
}).catch(() => {
fallbackCopy(text);
});
}

// Fallback method (works everywhere)
function fallbackCopy(text) {
const textarea = document.createElement("textarea");
textarea.value = text;
document.body.appendChild(textarea);
textarea.select();
document.execCommand("copy");
document.body.removeChild(textarea);

showToast("Copied! Share it in Teams 🚀");
}
function showToast(msg) {
const toast = document.createElement("div");
toast.innerText = msg;
toast.style.position = "fixed";
toast.style.bottom = "20px";
toast.style.left = "50%";
toast.style.transform = "translateX(-50%)";
toast.style.background = "#333";
toast.style.color = "white";
toast.style.padding = "10px 20px";
toast.style.borderRadius = "5px";
toast.style.zIndex = "1000";

document.body.appendChild(toast);

setTimeout(() => toast.remove(), 2000);
}


</script>

</body>
</html>
